        - heading "¿Qué es el Plan de Salud de Euskadi?" [level=2] [ref=e69]
        - separator [ref=e70]
        - paragraph [ref=e71]: Es la hoja de ruta que define las políticas sanitarias que desarrollará el Gobierno Vasco en los próximos años con el propósito de liderar una Euskadi más saludable, garantizando la salud de la población y sin dejar a nadie atrás.
        - paragraph [ref=e72]:
          - text: El Plan se enmarca en dos principios rectores
          - strong [ref=e73]: del Programa de Gobierno 2020- 2024
          - text: "de la XII Legislatura (PG): Garantizar la salud de la población, principio que ha adquirido aún más preeminencia a partir de la pandemia del COVID-19; y que renueva la voluntad de avanzar un marco de colaboración con los múltiples sectores cuya acción contribuye a la salud desde una óptica de Salud en Todas las Políticas. El Plan de Salud contribuye a sentar unas bases sólidas para establecer dicho marco. Precisamente, aspira a facilitar la orientación y el diseño de políticas que lleven a conseguir una"
          - strong [ref=e74]: Euskadi más saludable.
        - generic [ref=e78]:
          - img "Estrategia de investigación e innovación en Salud 2022-2025" [ref=e79]
          - link "Plan de Salud 2030" [ref=e81] [cursor=pointer]:
            - /url: /contenidos/informacion/plan_salud_2030/es_def/adjuntos/plan-salud-2030.pdf
            - generic [ref=e82]: Plan de Salud 2030
        - heading "Objetivos del Plan" [level=2] [ref=e83]
        - separator [ref=e84]
        - paragraph [ref=e85]:
          - strong [ref=e86]: "Entre los objetivos que define para lograr ese fin, destacan cuatro principales:"
        - generic [ref=e88]:
          - generic [ref=e89]:
            - img "potenciar el desarrollo en salud de los niños, niñas y adolescentes" [ref=e90]
            - paragraph [ref=e91]: Potenciar el desarrollo en salud de los niños, niñas y adolescentes
          - generic [ref=e92]:
            - img "fomentar el envejecimiento activoy de vida plena" [ref=e93]
            - paragraph [ref=e94]: Fomentar el envejecimiento activoy de vida plena
          - generic [ref=e95]:
            - img "disminuir la morbi-mortalidadevitable en la población vasca" [ref=e96]
            - paragraph [ref=e97]: Disminuir la morbi-mortalidadevitable en la población vasca
          - generic [ref=e98]:
            - img "Imagen 4" [ref=e99]
            - paragraph [ref=e100]: Reducir las desigualdadesen salud.
        - paragraph [ref=e101]:
          - text: El Plan persigue también, y de manera instrumental en relación con los objetivos anteriores,
          - strong [ref=e102]: fortalecer la calidad de los sistemas asistenciales, social y sanitario, y el sistema de salud pública
          - text: ; fomentar la
          - strong [ref=e103]: salud del medio ambiente desde un enfoque de Una Sola Salud
          - text: y propiciar entornos urbanos y sociales saludables; y el
          - strong [ref=e104]: protagonismo de las personas en su salud
          - text: . Sin olvidar la apuesta por la
          - strong [ref=e105]: investigación e innovación en salud
          - text: .
        - paragraph [ref=e106]:
          - text: El Plan de Salud establece
          - strong [ref=e107]: 10 objetivos que engloban más de 70 líneas estratégicas
          - text: ". Del total de 10 objetivos definidos, 3 tienen un carácter transversal:"
        - generic [ref=e109]:
          - generic [ref=e110]:
            - list [ref=e111]:
              - listitem [ref=e112]: Reducir las desigualdades de salud.
              - listitem [ref=e113]: Conseguir que las personas sean protagonistas y agentes activos de su salud y bienestar.
              - listitem [ref=e114]: Mejorar la coordinación y colaboración institucional y con todos los agentes y en todos los niveles, de cara a asegurar la salud en todas las políticas.
            - paragraph [ref=e115]:
              - text: El resto de
              - strong [ref=e116]: objetivos,
              - text: "en síntesis, son los siguientes:"
            - list [ref=e117]:
              - listitem [ref=e118]: Lograr que las niñas, niños y adolescentes nazcan, crezcan y se desarrollen con todo su potencial de salud.
              - listitem [ref=e119]: Mejorar la salud y reducir la morbimortalidad.
              - listitem [ref=e120]: Conseguir un envejecimiento orientado al enfoque de vida plena.
              - listitem [ref=e121]: Lograr la sostenibilidad y excelencia en términos de calidad, humanización y seguridad en los sistemas asistenciales sanitarios y sociosanitarios de Euskadi.
              - listitem [ref=e122]: Fortalecer el Sistema de Salud Pública para hacer frente a los actuales y nuevos retos.
              - listitem [ref=e123]: Crear y desarrollar entornos y comunidades saludables, sostenibles y resilientes y responder al cambio climático.
              - listitem [ref=e124]: Invertir en la investigación y la innovación en Euskadi y su aplicación para la mejora de los sistemas que inciden en la salud.
          - img "otros objetivos del Plan de Saud 2030" [ref=e126]
        - heading "Cuadro de mando" [level=2] [ref=e127]
        - separator [ref=e128]
        - paragraph [ref=e129]:
          - text: El
          - strong [ref=e130]: Plan de Salud Euskadi 2030
          - text: contempla un modelo para la monitorización y seguimiento de su despliegue, así como para la evaluación de los logros obtenidos a través de su implementación. Se trata de una herramienta imprescindible para la gestión y mejora del despliegue del Plan de Salud Euskadi 2030, al identificar sus factores de éxito y barreras. También es fundamental para la rendición de cuentas ante la ciudadanía.
        - paragraph [ref=e131]:
          - text: El
          - strong [ref=e132]: Cuadro de mando
          - text: es uno de los pilares del modelo de evaluación, el cual se completará con evaluaciones temáticas del avance y consecución de los objetivos del Plan de Salud Euskadi 2030. Está compuesto por un conjunto de indicadores, ordenados por los objetivos del Plan de Salud, dirigidos a proporcionar una visión cuantitativa de aspectos relacionados con los logros esperados.
        - paragraph [ref=e133]: Es necesario utilizar los datos proporcionados por el cuadro de mando de manera conjunta con los resultados de las evaluaciones temáticas para proporcionar una información más sólida sobre el alcance de los logros obtenidos por las actuaciones enmarcadas en el Plan de Salud Euskadi 2030.
        - list [ref=e134]:
          - listitem [ref=e135]:
            - link "Cuadro de mando (PDF, 2 MB) (abre en nueva ventana)" [ref=e136] [cursor=pointer]:
              - /url: /contenidos/informacion/plan_salud_2030/es_def/adjuntos/cuadro-mando-plan-salud-2030.pdf
              - text: Cuadro de mando (PDF, 2 MB)
              - img "(abre en nueva ventana)" [ref=e138]
        - heading "Objetivos de desarrollo sostenible (ODS)" [level=2] [ref=e139]
        - separator [ref=e140]
        - generic [ref=e142]:
          - link "Objetivos de desarrollo sostenible (ODS)" [ref=e144] [cursor=pointer]:
            - /url: https://www.un.org/sustainabledevelopment/es/objetivos-de-desarrollo-sostenible/
            - img "Objetivos de desarrollo sostenible (ODS)" [ref=e145]
          - generic [ref=e146]:
            - paragraph [ref=e147]:
              - text: Los objetivos planteados en el
              - strong [ref=e148]: Plan de Salud Euskadi 2030
              - text: están íntimamente relacionados con los objetivos de desarrollo sostenible (ODS), lo que implica un ámbito de actuación compartido. Los ODS son condiciones y prerrequisitos para la salud, y la salud lo es para el desarrollo. Así, más allá del ODS número 3, Garantizar una vida sana y promover el bienestar para todos en todas las edades, los ODS inciden en determinantes directos de la salud y de las desigualdades en salud, como son acabar con el hambre y la pobreza, el acceso a un empleo, asegurar una educación inclusiva, equitativa y de calidad, lograr la igualdad de género, mejorar el medio ambiente y combatir el cambio climático, entre otros.
            - list [ref=e149]:
              - listitem [ref=e150]:
                - link "Objetivos de desarrollo sostenible (ODS) (abre en nueva ventana)" [ref=e151] [cursor=pointer]:
                  - /url: https://www.un.org/sustainabledevelopment/es/objetivos-de-desarrollo-sostenible/
                  - text: Objetivos de desarrollo sostenible (ODS)
